upstream main_platform {
    server main-platform:3000;
}

upstream care_app {
    server care-app:3001;
}

upstream hr_app {
    server hr-app:3002;
}

upstream ursafe_app {
    server ursafe-app:3003;
}

upstream api_server {
    server api:8080;
}

server {
    listen 80;
    server_name www.vlworkhub.ca vlworkhub.ca;

    location /api/ {
        proxy_pass http://api_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://main_platform;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name care.vlworkhub.ca;

    location / {
        proxy_pass http://care_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name hr.vlworkhub.ca;

    location / {
        proxy_pass http://hr_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name ursafe.vlworkhub.ca;

    location / {
        proxy_pass http://ursafe_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
