map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream main_platform {
    server main-platform:3000;
}

upstream hr_app {
    server hr-app:3002;
}

upstream api_server {
    server api:8080;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name vlworkhub.ca www.vlworkhub.ca hr.vlworkhub.ca api.vlworkhub.ca care.vlworkhub.ca ursafe.vlworkhub.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vlworkhub.ca;

    ssl_certificate /etc/letsencrypt/live/vlworkhub.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vlworkhub.ca/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    return 301 https://www.vlworkhub.ca$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.vlworkhub.ca;

    ssl_certificate /etc/letsencrypt/live/vlworkhub.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vlworkhub.ca/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    location / {
        proxy_pass http://main_platform;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_http_version 1.1;
    }
}

