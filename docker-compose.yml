version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: vlworkhub-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vlworkhub}
      POSTGRES_USER: ${POSTGRES_USER:-vlworkhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    # Locked to localhost only — connect via SSH tunnel (e.g. DBeaver). LAN/public exposure removed.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /srv/vlworkhub/postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: vlworkhub-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_BASE_URL: ${API_BASE_URL}
      MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
      HR_APP_URL: ${HR_APP_URL}
      CARE_APP_URL: ${CARE_APP_URL}
      URSAFE_APP_URL: ${URSAFE_APP_URL}
      JWT_SECRET: ${JWT_SECRET:-}
      EMAIL_SETTINGS_ENCRYPTION_KEY: ${EMAIL_SETTINGS_ENCRYPTION_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-vlworkhub}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@vlworkhub-postgres:5432/${POSTGRES_DB:-vlworkhub}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ANNOUNCEMENTS_STORAGE_PATH: ${ANNOUNCEMENTS_STORAGE_PATH:-/app/services/api/uploads/announcements}
    # Internal only — nginx proxies to api:8080 via Docker network. No host port exposure needed.
    expose:
      - "8080"
    volumes:
      - /mnt/synology/HRDocuments/original:/app/services/api/uploads/original
      - /mnt/synology/HRDocuments/signed:/app/services/api/uploads/signed
      - /mnt/synology/HRDocuments/onboarding:/app/services/api/uploads/onboarding
      - /mnt/synology/MainPlatformDocuments/organizations:/app/services/api/uploads/organizations
      - /mnt/synology/MainPlatformDocuments/departments:/app/services/api/uploads/departments
      - /mnt/synology/HRDocuments/Announcements/Images:/app/services/api/uploads/announcements/Images
      - /mnt/synology/HRDocuments/Announcements/Attachments:/app/services/api/uploads/announcements/Attachments
    depends_on:
      - postgres

  main-platform:
    build:
      context: .
      dockerfile: apps/main-platform/Dockerfile
      args:
        MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
        HR_APP_URL: ${HR_APP_URL}
        CARE_APP_URL: ${CARE_APP_URL}
        URSAFE_APP_URL: ${URSAFE_APP_URL}
        API_BASE_URL: ${API_BASE_URL}
        NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
        NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
        NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
        NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    container_name: vlworkhub-main-platform
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      API_BASE_URL: ${API_BASE_URL}
      MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
      HR_APP_URL: ${HR_APP_URL}
      CARE_APP_URL: ${CARE_APP_URL}
      URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
      NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
      NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    # Internal only — nginx proxies to main-platform:3000 via Docker network. No host port exposure needed.
    expose:
      - "3000"
    depends_on:
      - api

  hr-app:
    build:
      context: .
      dockerfile: apps/hr-app/Dockerfile
      args:
        MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
        HR_APP_URL: ${HR_APP_URL}
        CARE_APP_URL: ${CARE_APP_URL}
        URSAFE_APP_URL: ${URSAFE_APP_URL}
        API_BASE_URL: ${API_BASE_URL}
        NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
        NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
        NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
        NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    container_name: vlworkhub-hr-app
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      API_BASE_URL: ${API_BASE_URL}
      MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
      HR_APP_URL: ${HR_APP_URL}
      CARE_APP_URL: ${CARE_APP_URL}
      URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
      NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
      NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    # Internal only — nginx proxies to hr-app:3002 via Docker network. No host port exposure needed.
    expose:
      - "3002"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: vlworkhub-nginx
    restart: always
    depends_on:
      - main-platform
      - hr-app
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/vlworkhub.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

