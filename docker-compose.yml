version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - main-platform
      - care-app
      - hr-app
      - ursafe-app
      - api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/vlworkhub.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vlworkhub
      MYSQL_USER: vlworkhub
      MYSQL_PASSWORD: vlworkhub
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3306:3306"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  main-platform:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/main-platform"
    env_file: .env.example
    depends_on:
      - api

  care-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/care-app"
    env_file: .env.example
    depends_on:
      - api

  hr-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/hr-app"
    env_file: .env.example
    depends_on:
      - api

  ursafe-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/ursafe-app"
    env_file: .env.example
    depends_on:
      - api

volumes:
  mysql_data:
