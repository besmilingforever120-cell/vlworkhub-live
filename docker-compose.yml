version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: vlworkhub-postgres
    environment:
      POSTGRES_DB: vlworkhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/pgsql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vlworkhub"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - main-platform
      - care-app
      - hr-app
      - ursafe-app
      - api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/vlworkhub.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vlworkhub
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  main-platform:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/main-platform"
    env_file: .env.example
    depends_on:
      api:
        condition: service_healthy

  care-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/care-app"
    env_file: .env.example
    depends_on:
      api:
        condition: service_healthy

  hr-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/hr-app"
    env_file: .env.example
    depends_on:
      api:
        condition: service_healthy

  ursafe-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        APP_NAME: "@vlworkhub/ursafe-app"
    env_file: .env.example
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
