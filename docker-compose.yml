version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: vlworkhub-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vlworkhub}
      POSTGRES_USER: ${POSTGRES_USER:-vlworkhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vlworkhub_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: vlworkhub-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_BASE_URL: ${API_BASE_URL}
      MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
      HR_APP_URL: ${HR_APP_URL}
      CARE_APP_URL: ${CARE_APP_URL}
      URSAFE_APP_URL: ${URSAFE_APP_URL}
      JWT_SECRET: ${JWT_SECRET:-}
      EMAIL_SETTINGS_ENCRYPTION_KEY: ${EMAIL_SETTINGS_ENCRYPTION_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-vlworkhub}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@vlworkhub-postgres:5432/${POSTGRES_DB:-vlworkhub}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TRUST_PROXY_HOPS: 1
    ports:
      - "8080:8080"
    volumes:
      - ./services/api/uploads:/app/services/api/uploads
    depends_on:
      - postgres

  main-platform:
    build:
      context: .
      dockerfile: apps/main-platform/Dockerfile
      args:
        MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
        HR_APP_URL: ${HR_APP_URL}
        CARE_APP_URL: ${CARE_APP_URL}
        URSAFE_APP_URL: ${URSAFE_APP_URL}
        API_BASE_URL: ${API_BASE_URL}
        NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
        NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
        NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
        NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    container_name: vlworkhub-main-platform
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      API_BASE_URL: ${API_BASE_URL}
      MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
      HR_APP_URL: ${HR_APP_URL}
      CARE_APP_URL: ${CARE_APP_URL}
      URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
      NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
      NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - api

  hr-app:
    build:
      context: .
      dockerfile: apps/hr-app/Dockerfile
      args:
        MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
        HR_APP_URL: ${HR_APP_URL}
        CARE_APP_URL: ${CARE_APP_URL}
        URSAFE_APP_URL: ${URSAFE_APP_URL}
        API_BASE_URL: ${API_BASE_URL}
        NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
        NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
        NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
        NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
        NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    container_name: vlworkhub-hr-app
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      API_BASE_URL: ${API_BASE_URL}
      MAIN_PLATFORM_URL: ${MAIN_PLATFORM_URL}
      HR_APP_URL: ${HR_APP_URL}
      CARE_APP_URL: ${CARE_APP_URL}
      URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_MAIN_APP_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_ROOT_URL: ${MAIN_PLATFORM_URL}
      NEXT_PUBLIC_HR_APP_URL: ${HR_APP_URL}
      NEXT_PUBLIC_CARE_APP_URL: ${CARE_APP_URL}
      NEXT_PUBLIC_URSAFE_APP_URL: ${URSAFE_APP_URL}
      NEXT_PUBLIC_API_URL: ${API_BASE_URL}
    ports:
      - "3002:3002"
    depends_on:
      - api

volumes:
  vlworkhub_pg_data:
