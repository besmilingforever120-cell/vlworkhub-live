version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: vlworkhub-postgres
    restart: always
    environment:
      POSTGRES_DB: vlworkhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vlworkhub_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: vlworkhub-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-}
      DATABASE_URL: postgres://postgres:postgres@vlworkhub-postgres:5432/vlworkhub
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.1.47:3000,http://192.168.1.47:3001,http://192.168.1.47:3002,http://192.168.1.47:3003
      TRUST_PROXY_HOPS: 1
    ports:
      - "8080:8080"
    volumes:
      - ./services/api/uploads:/app/services/api/uploads
    depends_on:
      - postgres

volumes:
  vlworkhub_pg_data:
